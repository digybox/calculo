<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión - Tanta</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #FDF9F1; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(226, 74, 42, 0.1); text-align: center; width: 100%; max-width: 350px; border: 1px solid #f0e6d2; }
        h2 { color: #E24A2A; margin-bottom: 20px; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; }
        .btn { background-color: #E24A2A; color: white; border: none; padding: 12px 20px; border-radius: 25px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; margin-top: 15px; }
        .btn:hover { background-color: #C0392B; }
        a { color: #E24A2A; text-decoration: none; font-size: 14px; display: block; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="auth-box">
        <h2>Iniciar Sesión</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn">Ingresar</button>
        </form>
        <a href="{% url 'registro' %}">¿No tienes cuenta? Regístrate aquí</a>
        <a href="/" style="color: #666; margin-top: 10px;">← Volver a la tienda</a>
    </div>
</body>
</html>
